services:
  - type: web
    name: speed-accounting
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: SPEED_ACCOUNTING_HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /var/data/speed_accounting.db
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    disk:
      name: speed-accounting-data
      mountPath: /var/data
      sizeGB: 1
